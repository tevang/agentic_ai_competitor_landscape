paths:
  pipeline_csv: data/subests/most_expensive.csv # Path to the CSV containing drug development pipeline stages
  chroma_path: .chroma_drug_pipeline # Local directory for ChromaDB persistence
  chroma_collection_name: drug_pipeline_competitor_evidence # Name of the vector database collection

runtime:
  max_steps: 5 # Maximum number of research iterations to perform
  max_candidates_per_step: 10 # Maximum company candidates to extract in a single step
  verbose: true # Whether to output detailed execution logs to the console

openai:
  api_key_env_var: OPENAI_API_KEY # Environment variable name for the OpenAI API key
  model: gpt-5 # The OpenAI model version used for text generation
  retry_attempts: 3 # Number of retry attempts for failed LLM calls
  retry_wait_min_seconds: 1 # Minimum wait time between retries in seconds
  retry_wait_max_seconds: 15 # Maximum wait time between retries in seconds

# Tavily knobs are grouped here so search rigor can be tuned without editing Python.
tavily:
  api_key_env_var: TAVILY_API_KEY # Environment variable name for the Tavily API key
  topic: general # Search topic category (general or news)
  search_depth: advanced # Search precision level (basic or advanced)
  chunks_per_source: 3 # Number of text chunks to pull from each search result
  default_max_results: 5 # Default maximum number of results per search query
  step_search_max_results: 5 # Max results for general research step queries
  company_search_max_results: 5 # Max results for company-specific deep-dives
  queries_per_step: 5 # Number of unique search queries generated per research step
  auto_parameters: false # Whether to let Tavily automatically tune search parameters
  exact_match: false # Whether to enforce exact keyword matching
  include_answer: false # Whether to include a generated answer in the search response
  include_raw_content: false # Whether to include full raw HTML in the search response
  include_images: false # Whether to include image URLs in results
  include_image_descriptions: false # Whether to include descriptions for returned images
  include_favicon: false # Whether to include favicons for search results
  include_usage: false # Whether to include API usage statistics in the response
  include_domains: [] # List of specific domains to restrict search to
  exclude_domains: [] # List of domains to block from search results
  country: null # Restrict search results to a specific country code
  time_range: null # Time window for news searches
  days: null # Number of days back to search
  start_date: null # Specific start date for search window
  end_date: null # Specific end date for search window
  step_fetch_text_for_top_n_results: 3 # Number of top results to fetch full text for during steps
  company_fetch_text_for_top_n_results: 3 # Number of top results to fetch full text for during company deep-dives
  # Fetching full page text for only the top-N search results saves time and tokens.
  page_text_char_limit: 2500 # Maximum characters to extract from a single web page
  trafilatura_include_links: false # Whether to include hyperlinks in extracted text
  trafilatura_include_images: false # Whether to include image metadata in extracted text
  search_cache_size: 512 # Number of search results to cache in memory
  fetch_cache_size: 1024 # Number of page contents to cache in memory

rag:
  chroma_document_char_limit: 4000 # Maximum characters allowed for a single document chunk in Chroma
  store_query_n_results: 8 # Number of results to retrieve for general storage queries
  enrichment_rag_results: 10 # Number of retrieval results for the enrichment agent
  verification_rag_results: 8 # Number of retrieval results for the verification agent
  step_context_limit: 12 # Maximum number of context items for the planner agent
  step_context_chars_per_item: 900 # Character limit for each context item in planner steps
  enrichment_context_limit: 14 # Maximum number of context items for enrichment
  enrichment_context_chars_per_item: 900 # Character limit for each context item in enrichment
  verification_context_limit: 8 # Maximum number of context items for verification
  verification_context_chars_per_item: 900 # Character limit for each context item in verification

react:
  enable_refinement_pass: true # Whether to perform an extra search pass for validation
  min_candidates_before_refine: 3 # Minimum candidates needed to trigger the refinement loop
  refinement_query_count: 5 # Number of targeted queries for the refinement pass

dedupe:
  fuzzy_threshold: 94 # Similarity threshold (0-100) for fuzzy company name deduplication

reporting:
  matrix_head_rows: 20 # Number of rows to show in the matrix preview
  profile_head_rows: 20 # Number of rows to show in the profile preview
  gap_head_rows: 12 # Number of rows to show in the gap analysis preview
  slide_gap_head_rows: 10 # Number of items to show in the slide-specific gap view
  slide_count: 10 # Total number of presentation slides to generate

scoring:
  explicit_agentic_weight: 0.5 # Extra score weight for companies with explicit agentic posture
  vertical_weight: 0.35 # Extra score weight for vertical-specialized companies
  whitespace_baseline: 4.5 # Baseline saturation value for calculating "white space"
  default_pain_weight: 2.5 # Default pain point weight for pipeline steps
  pain_weights: # Custom weight assigned to each pipeline step to represent its market difficulty or "pain"
    Target identification: 2.0
    Target validation: 2.2
    Assay development: 2.0
    Hit identification: 1.8
    Hit-to-Lead: 2.0
    Lead identification: 2.0
    Lead optimization: 2.0
    Candidate selection & pre-formulation: 2.8
    Pharmacology & ADME: 2.6
    Toxicology: 3.4
    Proof-of-concept & efficacy: 2.8
    Phase 0 (microdosing): 2.2
    Formulation & delivery optimisation: 3.2
    IND preparation: 3.5
    Study design & initiation: 2.6
    Phase I: 2.4
    Phase II: 2.6
    Phase III: 2.8
    Phase IV: 2.7
    NDA/BLA submission: 3.3
    FDA review & decision: 3.2
    Reasons for failure: 3.0
    Generics/ANDA: 2.4
    Pharmacovigilance: 3.3
    Additional indications & formulations: 2.8
    Manufacturing scale-up & quality: 3.5
  regulatory_tailwind: # Positive multipliers applied to steps that benefit from specific regulatory environments
    Toxicology: 1.4
    Formulation & delivery optimisation: 0.8
    IND preparation: 1.6
    NDA/BLA submission: 1.4
    FDA review & decision: 1.2
    Pharmacovigilance: 1.4
    Manufacturing scale-up & quality: 1.2