    - https://developer.company-information.service.gov.uk
    - https://www.sec.gov/search-filings
    - https://www.gleif.org
    - https://www.wikidata.org
    - https://biopharmguy.com
    - https://clutch.co

openai:
  api_key_env_var: OPENAI_API_KEY # Environment variable name for the OpenAI API key
  model: gpt-5 # The OpenAI model version used for text generation
  retry_attempts: 3 # Number of retry attempts for failed LLM calls
  retry_wait_min_seconds: 1 # Minimum wait time between retries in seconds
  retry_wait_max_seconds: 15 # Maximum wait time between retries in seconds

search_protocol:
  active_rigor: standard # Fallback search preset if a mode-specific preset is not available. Options: light, standard, or deep
  scan_rigor: scan # Search preset automatically used in landscape_scan mode
  deep_dive_rigor: deep # Search preset automatically used in deep_dive mode
  reuse_existing_step_evidence: true # Reuse previously stored step-level evidence before launching Tavily searches
  reuse_existing_company_evidence: true # Reuse previously stored company-level evidence before launching Tavily searches in deep_dive mode
  reuse_existing_profiles: true # Reuse previously stored company profiles before asking the LLM again in deep_dive mode
  reuse_existing_query_plans: false # Regenerate query plans when testing changed discovery logic
  reuse_existing_candidates: true # Reuse cached extracted candidates as priors, not as final candidate lists
  reuse_existing_verifications: false # Disable stale verification reuse during reruns after taxonomy/discovery changes
  reuse_rosters_across_activity_text_changes: true # Allow prior candidate rosters for the same phase/step even when the activity text signature changes
  skip_web_if_existing_step_docs_at_least: 12 # Minimum cached step docs that can satisfy a run only when allow_web_search_after_cache_hit is false
  skip_web_if_existing_company_docs_at_least: 10 # Minimum cached company docs that can satisfy a run only when allow_web_search_after_cache_hit is false
  skip_llm_if_existing_profile_confidence_at_least: 0.75 # Reuse a cached company profile if confidence is already high enough
  skip_llm_if_existing_verification_confidence_at_least: 0.75 # Reuse a cached verification decision if verification reuse is enabled
  prefer_cached_url_text: true # Reuse previously stored page text for a URL before fetching it again
  allow_web_search_after_cache_hit: true # If true, cached evidence is merged with fresh search rather than stopping discovery early

discovery:
  deterministic_queries_enabled: true # Add generic non-LLM search templates derived from the pipeline row and taxonomy labels
  skip_llm_query_planning_in_landscape_scan: true # In landscape_scan mode, use deterministic queries only to save OpenAI tokens
  skip_company_enrichment_in_landscape_scan: true # In landscape_scan mode, do not run company enrichment searches/LLM calls
  skip_verification_in_landscape_scan: true # In landscape_scan mode, do not run per-company verification LLM calls
  landscape_scan_agentic_postures: # Candidate posture labels allowed into the first-pass map
    - explicit
    - adjacent
  max_auto_queries_per_step: 18 # Maximum deterministic discovery queries added per step
  max_total_queries_per_step: 28 # Maximum total LLM + deterministic queries executed per step
  max_search_terms_per_step: 24 # Maximum derived workflow terms used for discovery query generation
  extraction_context_docs_per_batch: 8 # Evidence documents per candidate-extraction prompt batch
  max_extraction_batches: 8 # Maximum evidence batches passed through candidate extraction
  max_candidates_per_extraction_batch: 25 # Maximum companies the extractor may return from one evidence batch
  include_cached_rosters_as_priors: true # Merge cached candidate rosters into new discovery instead of returning them as the final answer
  include_seed_companies_without_step_hints: false # Do not inject global seed companies into every step unless enabled here
  global_seed_step_match_min_token_overlap: 2 # If global seed injection is enabled, minimum overlap with derived step terms
  company_evidence_include_step_terms: true # Add step/workflow-specific terms to company-enrichment searches for discovered candidates
  priority_domains_as_site_queries: true # Treat company_data_sources as supplemental site: searches, not Tavily include_domains filters
  priority_site_query_limit: 8 # Maximum priority domains to probe per company evidence pass
  priority_site_results: 2 # Maximum results for each supplemental priority-domain query

retrieval_guard:
  enabled: true # Enable clean-text quality checks before page text enters the pipeline
  min_clean_text_chars: 350 # Minimum cleaned text length before a page is considered substantial
  detect_cookie_banners: true # Detect cookie banner boilerplate in extracted text or HTML
  detect_consent_walls: true # Detect consent walls that suppress or pollute article text
  detect_captcha_pages: true # Detect CAPTCHA-style pages and mark them as blocked
  detect_challenge_pages: true # Detect Cloudflare or anti-bot challenge pages and mark them as blocked
  detect_javascript_placeholders: true # Detect JavaScript placeholders such as "enable JavaScript" or "loading app"
  strip_cookie_banner_lines: true # Strip obvious cookie-banner phrases from otherwise valid content
  safe_fail_on_protected_pages: true # Never attempt challenge or CAPTCHA bypass; mark such pages as blocked
  allow_browser_render_fallback: true # Allow a browser-render fallback for normal JS-rendered pages only
  browser_render_timeout_ms: 15000 # Timeout for Playwright page rendering when the fallback is enabled
  browser_wait_until: domcontentloaded # Playwright wait condition used by the optional JS-render fallback
  browser_headless: true # Run the browser-render fallback in headless mode
  browser_user_agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0 Safari/537.36 # User-Agent string used by the optional browser-render fallback

taxonomy:
  enforce: true # Force verified or scan-included company-step links into the controlled domain taxonomy before analysis
  include_in_planner_prompt: true # Show the canonical taxonomy target in planner prompts
  include_in_verification_prompt: true # Show the canonical taxonomy target in verification prompts
  canonical_phases: # Controlled top-level lifecycle buckets
    - Discovery
    - Preclinical
    - Clinical
    - Regulatory
    - Manufacturing
    - Pharmacovigilance
    - Commercial/Lifecycle

# Tavily knobs are grouped here so search rigor can be tuned without editing Python.
tavily:
  api_key_env_var: TAVILY_API_KEY # Environment variable name for the Tavily API key
  topic: general # Search topic category (general, news, finance)
  auto_parameters: false # Whether to let Tavily automatically tune search parameters
  exact_match: false # Whether to enforce exact keyword matching
  include_answer: false # Whether to include a generated answer in the search response
  include_raw_content: false # Whether to include raw page content in the Tavily response itself
  include_images: false # Whether to include image URLs in search responses
  include_image_descriptions: false # Whether to include descriptions for returned images
  include_favicon: false # Whether to include favicons for search results
  include_usage: false # Whether to include Tavily API usage statistics when available
  include_domains: [] # Global hard include-domain filter; leave empty for broad web discovery
  exclude_domains: [] # List of domains to block from search results
  country: null # Restrict search results to a specific country code
  time_range: null # Time window for news searches
  days: null # Number of days back to search
  start_date: null # Specific start date for search window
  end_date: null # Specific end date for search window
  trafilatura_include_links: false # Whether to include hyperlinks in extracted text
  trafilatura_include_images: false # Whether to include image metadata in extracted text
  search_cache_size: 512 # Number of Tavily search responses to cache in memory
  fetch_cache_size: 1024 # Number of fetched page contents or rendered results to cache in memory
  profiles:
    scan: # Lowest-credit first-pass landscape map; uses snippets and avoids full-page fetching
      search_depth: basic # Basic search avoids the extra cost of advanced depth
      chunks_per_source: null # Not used for basic search
      default_max_results: 4 # Default maximum number of results per query
      step_search_max_results: 4 # Max results for step-level discovery queries
      company_search_max_results: 1 # Not normally used in landscape_scan mode
      queries_per_step: 0 # LLM query planning is skipped in landscape_scan mode
      queries_per_company: 0 # Company enrichment is skipped in landscape_scan mode
      step_fetch_text_for_top_n_results: 0 # Do not fetch full page text in first-pass mapping
      company_fetch_text_for_top_n_results: 0 # Do not fetch company pages in first-pass mapping
      page_text_char_limit: 800 # Safety limit if any cached text is reused
    light: # Fast and cheap preset for exploratory deep_dive runs
      search_depth: basic
      chunks_per_source: 1
      default_max_results: 3
      step_search_max_results: 3
      company_search_max_results: 4
      queries_per_step: 3
      queries_per_company: 5
      step_fetch_text_for_top_n_results: 1
      company_fetch_text_for_top_n_results: 2
      page_text_char_limit: 1200
    standard: # Balanced preset for most production deep_dive runs
      search_depth: advanced
      chunks_per_source: 2
      default_max_results: 5
      step_search_max_results: 6
      company_search_max_results: 7
      queries_per_step: 5
      queries_per_company: 8
      step_fetch_text_for_top_n_results: 3
      company_fetch_text_for_top_n_results: 4
      page_text_char_limit: 2500
    deep: # Highest rigor preset; use after choosing specific subphases of interest
      search_depth: advanced
      chunks_per_source: 3
      default_max_results: 8
      step_search_max_results: 8
      company_search_max_results: 10
      queries_per_step: 6
      queries_per_company: 10
      step_fetch_text_for_top_n_results: 5
      company_fetch_text_for_top_n_results: 6
      page_text_char_limit: 4000

rag:
  chroma_document_char_limit: 4000 # Maximum characters allowed for a single document chunk in Chroma
  store_query_n_results: 8 # Number of results to retrieve for general vector-store similarity queries
  enrichment_rag_results: 12 # Number of retrieval results for the enrichment agent
  verification_rag_results: 12 # Number of retrieval results for the verification agent
  step_context_limit: 12 # Maximum number of context items for a single step-level extraction batch
  step_context_chars_per_item: 1100 # Character limit for each context item in step-level prompts
  enrichment_context_limit: 16 # Maximum number of context items for enrichment prompts
  enrichment_context_chars_per_item: 1000 # Character limit for each context item in enrichment prompts
  verification_context_limit: 12 # Maximum number of context items for verification prompts
  verification_context_chars_per_item: 1000 # Character limit for each context item in verification prompts

react:
  enable_refinement_pass: true # Whether to perform an extra search pass for validation
  min_candidates_before_refine: 8 # Minimum candidates needed to avoid the refinement loop
  refinement_query_count: 6 # Number of targeted queries for the refinement pass

dedupe:
  fuzzy_threshold: 94 # Similarity threshold (0-100) for fuzzy company name deduplication

reporting:
  matrix_head_rows: 50 # Number of rows to show in the matrix preview
  profile_head_rows: 100 # Number of rows to show in the profile preview
  gap_head_rows: 12 # Number of rows to show in the gap analysis preview
  slide_gap_head_rows: 10 # Number of items to show in the slide-specific gap view
  slide_count: 10 # Total number of presentation slides to generate in deep_dive mode
  write_markdown_files: true # Whether to write markdown reports to disk
  report_file_name: competitor_landscape_report.md # Main markdown report containing all sections
  gap_memo_file_name: gap_memo.md # Standalone markdown file for the synthesized memo in deep_dive mode
  slide_outline_file_name: presentation_outline.md # Standalone markdown file for the slide outline in deep_dive mode
  fact_analysis_file_name: fact_driven_analysis.md # Standalone markdown file for the fact-driven analyst in deep_dive mode
  critical_review_file_name: critical_review.md # Standalone markdown file for the critical agent in deep_dive mode
  include_logo_gallery: true # Whether to include a logo gallery in the main markdown report
  include_unverified_profiles: false # If false, profile tables/logos include only companies included in processed steps
  generate_narratives_in_landscape_scan: false # If false, skip analyst/critical/memo/slide LLM calls during landscape_scan mode

logos:
  download_enabled: true # Whether to try downloading a logo for every reportable profiled company
  copy_cached_logo_to_report_dir: false # If false, markdown references reusable logos from paths.logo_cache_dir instead of duplicating them per report
  request_timeout_seconds: 15 # Timeout for website and image download requests
  min_image_bytes: 200 # Ignore tiny files that are unlikely to be useful logos
  max_image_bytes: 5000000 # Maximum image size to download per logo
  try_logo_img: true # Try to detect <img> tags that look like logos
  try_og_image: true # Try OpenGraph image metadata as a fallback
  fallback_to_favicon: true # Fall back to favicon or apple-touch-icon if no logo is found
  allowed_extensions: # Allowed output file extensions for stored logos
    - .png
    - .jpg
    - .jpeg
    - .svg
    - .webp
    - .ico

scoring:
  explicit_agentic_weight: 0.5 # Extra score weight for companies with explicit agentic posture
  vertical_weight: 0.35 # Extra score weight for vertical-specialized companies
  whitespace_baseline: 4.5 # Baseline saturation value for calculating white-space opportunity
  default_pain_weight: 2.5 # Default pain point weight for pipeline steps
  pain_weights: # Custom weight assigned to each pipeline step to represent its market difficulty or pain
    Target identification: 2.0
    Target validation: 2.2
    Assay development: 2.0
    Hit identification: 1.8
    Hit-to-Lead: 2.0
    Lead identification: 2.0
    Lead optimization: 2.0
    Candidate selection & pre-formulation: 2.8
    Pharmacology & ADME: 2.6
    Toxicology: 3.4
    Proof-of-concept & efficacy: 2.8
    Phase 0 (microdosing): 2.2
    Formulation & delivery optimisation: 3.2
    IND preparation: 3.5
    Study design & initiation: 2.6
    Phase I: 2.4
    Phase II: 2.6
    Phase III: 2.8
    Phase IV: 2.7
    NDA/BLA submission: 3.3
    FDA review & decision: 3.2
    Reasons for failure: 3.0
    Generics/ANDA: 2.4
    Pharmacovigilance: 3.3
    Additional indications & formulations: 2.8
    Manufacturing scale-up & quality: 3.5
  regulatory_tailwind: # Positive multipliers applied to steps that benefit from specific regulatory environments
    Toxicology: 1.4
    Formulation & delivery optimisation: 0.8
    IND preparation: 1.6
    NDA/BLA submission: 1.4
    FDA review & decision: 1.2
    Pharmacovigilance: 1.4
    Manufacturing scale-up & quality: 1.2