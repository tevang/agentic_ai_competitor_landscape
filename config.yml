paths:
  pipeline_csv: data/subests/one_most_expensive.csv # Path to the CSV containing drug development pipeline stages; can be a one-row subset or the full ontology
  seed_companies_csv: data/input/user_seed_companies.csv # Optional CSV of user-provided companies to confirm and enrich
  chroma_path: .chroma_drug_pipeline # Local directory for ChromaDB persistence
  chroma_collection_name: drug_pipeline_competitor # Prefix used for the Chroma collections
  reports_dir: reports # Base directory for markdown reports
  logos_subdir: logos # Optional per-report logo subdirectory when copying cached logos into a report folder
  logo_cache_dir: assets/company_logos # Reusable logo cache checked before any new logo download

runtime:
  analysis_mode: landscape_scan # landscape_scan = cheap first-pass map; deep_dive = full enrichment/verification/reporting
  max_steps: 0 # Maximum number of pipeline rows to process; set to 0 to process every row in the filtered pipeline CSV
  max_candidates_per_step: 60 # Maximum discovered company/product candidates to keep per pipeline step after dedupe
  verbose: true # Whether to output the current high-level execution logs to the console
  verbosity: 1 # 0 = current behavior; 1 = extra rough usage logs for Tavily searches, page fetches, and OpenAI calls
  process_user_seed_companies_first: false # If true, pre-enrich every seed company before discovery; false avoids polluting first-pass reports with unrelated global seeds
  match_seed_companies_to_steps: true # Use explicit phase/step hints from the seed CSV; generic seeds without hints are not blindly injected by default
  deep_dive_phases: [] # Optional list of phases to keep when analysis_mode is deep_dive; empty means no phase filter
  deep_dive_subphases: [] # Optional list of subphases/steps to keep when analysis_mode is deep_dive; empty means no subphase filter
  run_label: null # Optional custom run label. Null creates a timestamped report directory

user_inputs:
  seed_companies_enabled: true # Whether to read the optional seed-company CSV file
  seed_companies_required: false # Whether the run should fail if the seed-company CSV is missing

