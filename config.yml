    - https://app.dealroom.co
    - https://www.sec.gov/search-filings
    - https://clutch.co
  founded: # Sites to prioritize, not restrict to, when confirming founding year in deep_dive mode
    - https://www.crunchbase.com/
    - https://craft.co
    - https://app.dealroom.co
    - https://api.opencorporates.com
    - https://developer.company-information.service.gov.uk
    - https://www.sec.gov/search-filings
    - https://www.wikidata.org
    - https://clutch.co
  headquarters: # Sites to prioritize, not restrict to, when confirming headquarters location in deep_dive mode
    - https://www.crunchbase.com/
    - https://craft.co
    - https://wellfound.com
    - https://app.dealroom.co
    - https://api.opencorporates.com
    - https://developer.company-information.service.gov.uk
    - https://www.sec.gov/search-filings
    - https://www.gleif.org
    - https://www.wikidata.org
    - https://biopharmguy.com
    - https://clutch.co
